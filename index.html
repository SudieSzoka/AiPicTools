<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="一组在浏览器中运行的图片处理工具，覆盖裁剪、缩放、格式转换、拼图和视频转帧等常用任务。">
    <meta name="theme-color" content="#0f766e">
    <title>我的工具站 | 在线图片处理工具</title>
    <link rel="icon" type="image/png" href="icon/aipictools.png">
    <link rel="stylesheet" href="common.css">
</head>
<body class="home-page">
    <a class="skip-link" href="#main-content">跳到主要内容</a>

    <header class="page-header">
        <div class="header-container">
            <div class="header-inner">
                <a href="index.html" class="brand-link" aria-label="我的工具站首页">
                    <img class="brand-mark" src="icon/aipictools.png" alt="">
                    <span>我的工具站</span>
                </a>
                <div class="home-header-actions">
                    <button class="button button-secondary" id="openEditButton" type="button" aria-haspopup="dialog">
                        编辑
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="home-main" id="main-content">
        <section class="catalog-section" aria-labelledby="catalog-title">
            <div class="catalog-toolbar">
                <div class="catalog-heading">
                    <h1 id="catalog-title">图片工具</h1>
                    <p><span id="toolCount">正在读取工具列表</span></p>
                </div>
                <div class="search-shell">
                    <img src="icon/search.png" alt="">
                    <label for="searchInput" class="visually-hidden">搜索工具</label>
                    <input
                        class="search-input"
                        type="search"
                        id="searchInput"
                        placeholder="搜索名称或用途"
                        autocomplete="off"
                    >
                </div>
            </div>

            <div class="favorites-bar">
                <div class="favorites-copy">
                    <h2>常用工具</h2>
                    <p>最多固定 3 个工具，方便下次直接打开。</p>
                </div>
                <div class="favorites-actions">
                    <div class="default-tools" id="defaultTools" aria-live="polite"></div>
                    <button class="button button-secondary favorites-edit-button" id="openEditInlineButton" type="button">
                        编辑常用工具
                    </button>
                </div>
            </div>

            <div class="tools-grid" id="toolsGrid" aria-live="polite" aria-busy="true">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>
        </section>
    </main>

    <footer class="page-footer">
        <div class="footer-container">
            <div class="footer-brand">
                <a href="index.html" class="footer-logo">我的工具站</a>
                <p class="footer-description">一组在浏览器中运行的图片处理工具，专注常用任务与清晰操作。</p>
            </div>
            <nav class="footer-links" aria-label="页脚导航">
                <a href="#catalog-title">全部工具</a>
            </nav>
        </div>
        <div class="footer-bottom">
            <p>© <span data-current-year>2026</span> 我的工具站</p>
        </div>
    </footer>

    <div class="modal" id="editDefaultToolsModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
        <div class="modal-panel">
            <div class="modal-header">
                <h2 id="modalTitle">编辑常用工具</h2>
                <button class="icon-button" id="closeEditButton" type="button" aria-label="关闭">×</button>
            </div>
            <div class="modal-body">
                <p>选择最多 3 个工具。</p>
                <div class="tool-selection-list" id="toolSelectionList"></div>
                <p class="form-message" id="selectionMessage" role="alert"></p>
            </div>
            <div class="modal-footer">
                <button class="button button-secondary" id="cancelEditButton" type="button">取消</button>
                <button class="button" id="saveEditButton" type="button">保存</button>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_TOOLS_KEY = "defaultToolPaths";
        const LEGACY_DEFAULT_TOOLS_KEY = "defaultTools";

        let tools = [];
        let defaultTools = [];
        let lastFocusedElement = null;

        const grid = document.getElementById("toolsGrid");
        const searchInput = document.getElementById("searchInput");
        const toolCount = document.getElementById("toolCount");
        const defaultToolsContainer = document.getElementById("defaultTools");
        const modal = document.getElementById("editDefaultToolsModal");
        const selectionList = document.getElementById("toolSelectionList");
        const selectionMessage = document.getElementById("selectionMessage");
        const openEditButton = document.getElementById("openEditButton");
        const openEditInlineButton = document.getElementById("openEditInlineButton");
        const closeEditButton = document.getElementById("closeEditButton");
        const cancelEditButton = document.getElementById("cancelEditButton");
        const saveEditButton = document.getElementById("saveEditButton");

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#039;");
        }

        function renderState(title, description) {
            grid.innerHTML = `
                <div class="catalog-state">
                    <strong>${escapeHtml(title)}</strong>
                    <span>${escapeHtml(description)}</span>
                </div>
            `;
        }

        function renderTools(toolsToRender = tools) {
            grid.setAttribute("aria-busy", "false");

            if (!toolsToRender.length) {
                renderState("没有匹配的工具", "换一个关键词继续搜索。");
                toolCount.textContent = "当前没有匹配结果";
                return;
            }

            grid.innerHTML = "";
            toolsToRender.forEach((tool, index) => {
                const link = document.createElement("a");
                link.className = "home-tool-card";
                link.href = tool.path;
                link.target = "_blank";
                link.rel = "noopener";
                link.style.setProperty("--card-index", index);
                link.innerHTML = `
                    <span class="tool-card-icon">
                        <img src="icon/${escapeHtml(tool.icon)}.png" alt="">
                    </span>
                    <h3>${escapeHtml(tool.name)}</h3>
                    <p>${escapeHtml(tool.description)}</p>
                    <span class="tool-card-action">打开工具</span>
                `;
                grid.appendChild(link);
            });

            toolCount.textContent = `共 ${toolsToRender.length} 个工具`;
        }

        function migrateLegacyDefaults() {
            const legacyValue = localStorage.getItem(LEGACY_DEFAULT_TOOLS_KEY);
            if (!legacyValue) return [];

            try {
                const legacyIds = JSON.parse(legacyValue);
                return legacyIds
                    .map((id) => tools.find((tool) => tool.id === id)?.path)
                    .filter(Boolean)
                    .filter((path, index, values) => values.indexOf(path) === index)
                    .slice(0, 3);
            } catch {
                return [];
            }
        }

        function loadDefaultTools() {
            try {
                const savedPaths = JSON.parse(localStorage.getItem(DEFAULT_TOOLS_KEY) || "[]");
                defaultTools = Array.isArray(savedPaths)
                    ? savedPaths.filter((path) => tools.some((tool) => tool.path === path)).slice(0, 3)
                    : [];
            } catch {
                defaultTools = [];
            }

            if (!defaultTools.length) {
                defaultTools = migrateLegacyDefaults();
            }

            if (!defaultTools.length) {
                defaultTools = tools.slice(0, 3).map((tool) => tool.path);
            }

            localStorage.setItem(DEFAULT_TOOLS_KEY, JSON.stringify(defaultTools));
            renderDefaultTools();
        }

        function renderDefaultTools() {
            defaultToolsContainer.innerHTML = "";

            defaultTools.forEach((toolPath) => {
                const tool = tools.find((item) => item.path === toolPath);
                if (!tool) return;

                const link = document.createElement("a");
                link.className = "default-tool-link";
                link.href = tool.path;
                link.target = "_blank";
                link.rel = "noopener";
                link.textContent = tool.name;
                defaultToolsContainer.appendChild(link);
            });
        }

        function renderToolSelection() {
            selectionList.innerHTML = "";
            selectionMessage.textContent = "";

            tools.forEach((tool, index) => {
                const item = document.createElement("div");
                item.className = "tool-choice";
                const inputId = `toolChoice${index}`;
                item.innerHTML = `
                    <input
                        type="checkbox"
                        id="${inputId}"
                        value="${escapeHtml(tool.path)}"
                        ${defaultTools.includes(tool.path) ? "checked" : ""}
                    >
                    <label for="${inputId}">${escapeHtml(tool.name)}</label>
                `;
                selectionList.appendChild(item);
            });

            selectionList.querySelectorAll('input[type="checkbox"]').forEach((checkbox) => {
                checkbox.addEventListener("change", () => {
                    const checked = selectionList.querySelectorAll('input[type="checkbox"]:checked');
                    if (checked.length > 3) {
                        checkbox.checked = false;
                        selectionMessage.textContent = "最多选择 3 个工具。";
                    } else {
                        selectionMessage.textContent = "";
                    }
                });
            });
        }

        function openModal() {
            lastFocusedElement = document.activeElement;
            renderToolSelection();
            modal.hidden = false;
            document.body.style.overflow = "hidden";
            closeEditButton.focus();
        }

        function closeModal() {
            modal.hidden = true;
            document.body.style.overflow = "";
            selectionMessage.textContent = "";
            lastFocusedElement?.focus();
        }

        function saveDefaultTools() {
            defaultTools = Array.from(
                selectionList.querySelectorAll('input[type="checkbox"]:checked')
            ).map((checkbox) => checkbox.value);

            localStorage.setItem(DEFAULT_TOOLS_KEY, JSON.stringify(defaultTools));
            renderDefaultTools();
            closeModal();
        }

        async function loadTools() {
            try {
                const response = await fetch("tools.json");
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                tools = data.filter((tool) => tool.show);
                renderTools();
                loadDefaultTools();
            } catch (error) {
                console.error("加载工具数据失败:", error);
                grid.setAttribute("aria-busy", "false");
                renderState("工具列表加载失败", "请刷新页面后重试。");
                toolCount.textContent = "工具列表暂时不可用";
                openEditButton.disabled = true;
            }
        }

        searchInput.addEventListener("input", (event) => {
            const searchTerm = event.target.value.trim().toLocaleLowerCase("zh-CN");
            const filteredTools = tools.filter((tool) => {
                return tool.name.toLocaleLowerCase("zh-CN").includes(searchTerm)
                    || tool.description.toLocaleLowerCase("zh-CN").includes(searchTerm);
            });
            renderTools(filteredTools);
        });

        openEditButton.addEventListener("click", openModal);
        openEditInlineButton.addEventListener("click", openModal);
        closeEditButton.addEventListener("click", closeModal);
        cancelEditButton.addEventListener("click", closeModal);
        saveEditButton.addEventListener("click", saveDefaultTools);

        modal.addEventListener("click", (event) => {
            if (event.target === modal) closeModal();
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && !modal.hidden) closeModal();
        });

        document.querySelectorAll("[data-current-year]").forEach((node) => {
            node.textContent = String(new Date().getFullYear());
        });

        loadTools();
    </script>
</body>
</html>
