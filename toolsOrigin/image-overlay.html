<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片叠加工具</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:#f5f7fb;padding:20px;min-height:100dvh}
        .container{max-width:1100px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.08);overflow:hidden}
        .header{background:linear-gradient(135deg,#6e8efb,#a777e3);color:#fff;padding:20px 24px}
        .header h1{font-size:20px;font-weight:600}
        .main{display:flex;gap:0}
        .left,.right{padding:20px}
        .left{width:40%;border-right:1px solid #eef2f7}
        .right{width:60%}

        .section-title{font-size:16px;color:#111827;margin-bottom:12px;font-weight:600}
        .upload-area{display:block;width:100%;border:2px dashed #cbd5e1;border-radius:10px;padding:24px;text-align:center;background:#f8fafc;transition:.2s;cursor:pointer;color:inherit;font:inherit}
        .upload-area:hover{border-color:#60a5fa;background:#f1f5f9}
        .upload-area.dragover{border-color:#22c55e;background:#ecfdf5}
        .upload-area span{display:block;color:#475569;font-size:14px}
        input[type="file"]{display:none}

        .list{margin-top:14px;display:flex;flex-direction:column;gap:10px;max-height:420px;overflow:auto}
        .item{display:flex;gap:10px;align-items:center;border:1px solid #e5e7eb;border-radius:10px;padding:10px;background:#fff}
        .thumb{flex:0 0 auto;width:72px;height:72px;border-radius:8px;overflow:hidden;background:#f1f5f9;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center}
        .thumb img{max-width:100%;max-height:100%;display:block}
        .meta{flex:1;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
        .idx{width:26px;height:26px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
        .badge{display:inline-block;background:#f1f5f9;color:#374151;padding:2px 8px;border-radius:999px;font-size:12px}
        .ctrl{display:flex;gap:8px;align-items:center}
        select,input[type="number"],input[type="text"]{border:1px solid #e5e7eb;border-radius:8px;padding:6px 8px;font-size:13px;background:#fff}
        .opacity{display:flex;align-items:center;gap:6px}
        input[type="range"]{height:6px}
        .btn{background:#3b82f6;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px}
        .btn.up{background:#6366f1}
        .btn.del{background:#ef4444}
        .btn:disabled{background:#cbd5e1;cursor:not-allowed}
        .btn:focus-visible,.upload-area:focus-visible,select:focus-visible,input:focus-visible{outline:3px solid rgba(59,130,246,.28);outline-offset:2px}

        .canvas-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px;display:flex;align-items:center;justify-content:center;min-height:360px}
        canvas{max-width:100%;height:auto;background:repeating-conic-gradient(#f3f4f6 0% 25%,#fff 0% 50%) 50%/20px 20px}
        .actions{margin-top:14px;display:flex;gap:10px;align-items:center}
        .hint{font-size:12px;color:#6b7280}
        .error{color:#dc2626;font-size:13px;margin-top:8px}
        .transparent-bg-section{margin-bottom:16px;padding:12px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0}
        .transparent-bg-toggle,.transparent-bg-size,.size-row{display:flex;align-items:center;gap:8px}
        .transparent-bg-toggle{margin-bottom:8px}
        .transparent-bg-size{display:none;gap:12px}
        .transparent-bg-size.is-visible{display:flex}
        .custom{display:none}
        .checkbox{width:16px;height:16px}
        .section-label{font-size:14px;color:#374151;cursor:pointer}
        .row-label{font-size:13px;color:#6b7280}
        .mini-label{font-size:12px;color:#6b7280}
        .size-input{width:80px;padding:4px 6px;border:1px solid #d1d5db;border-radius:4px;font-size:12px}
        .item-actions{display:flex;flex-direction:column;gap:8px}
        .coord-input{width:90px}
        .custom.is-visible{display:flex}
        @media(max-width:800px){.main{display:block}.left,.right{width:100%;border-right:none}.left{border-bottom:1px solid #eef2f7}.transparent-bg-size,.size-row{flex-wrap:wrap}}
    </style>
    <!--
        说明：
        - 列表顶部(索引0)图片为背景，其尺寸决定画布尺寸
        - 其他图片按列表顺序依次叠加
        - 每张图可选锚点位置或自定义坐标，以及透明度
        - 仅提供「上移」以满足需求
    -->
</head>
<body>
    <div class="container">
        <div class="header"><h1>图片叠加工具</h1></div>
        <div class="main">
            <div class="left">
                <div class="section-title">预览</div>
                <div class="canvas-wrap">
                    <canvas id="canvas"></canvas>
                </div>
                <div class="actions">
                    <button id="dlBtn" class="btn" type="button" disabled>下载 PNG</button>
                    <span class="hint">提示：任何修改都会自动更新预览</span>
                </div>
                <div id="err" class="error" aria-live="polite" hidden></div>
            </div>
            <div class="right">
                <div class="section-title">图片与参数（第一张为背景）</div>
                <!-- 透明背景选项 -->
                <div class="transparent-bg-section">
                    <div class="transparent-bg-toggle">
                        <input class="checkbox" type="checkbox" id="useTransparentBg">
                        <label class="section-label" for="useTransparentBg">使用透明背景</label>
                    </div>
                    <div id="transparentBgSize" class="transparent-bg-size">
                        <span class="row-label">背景尺寸：</span>
                        <div class="size-row">
                            <label class="mini-label" for="transparentBgWidth">宽</label>
                            <input class="size-input" type="number" id="transparentBgWidth" value="200" min="1" max="4000">
                            <label class="mini-label" for="transparentBgHeight">高</label>
                            <input class="size-input" type="number" id="transparentBgHeight" value="300" min="1" max="4000">
                        </div>
                    </div>
                </div>

                <button id="uploadArea" class="upload-area" type="button">
                    <span>点击选择图片或拖拽图片到此处</span>
                    <span>第一张作为背景，其余图片按列表顺序叠加。</span>
                </button>
                <input id="fileInput" type="file" accept="image/*" multiple>
                <div class="list" id="list"></div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const listEl = document.getElementById('list');
        // 实时预览，无需手动生成按钮
        const dlBtn = document.getElementById('dlBtn');
        const errEl = document.getElementById('err');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 透明背景相关元素
        const useTransparentBg = document.getElementById('useTransparentBg');
        const transparentBgSize = document.getElementById('transparentBgSize');
        const transparentBgWidth = document.getElementById('transparentBgWidth');
        const transparentBgHeight = document.getElementById('transparentBgHeight');

        /** @type {{file:File,url:string,img?:HTMLImageElement,posMode:'anchor'|'custom',anchor:string,customX:number,customY:number,opacity:number}[]} */
        let items = [];
        let renderToken = 0;
        const MAX_FILES = 12;
        const MAX_FILE_BYTES = 50 * 1024 * 1024;
        const MAX_IMAGE_PIXELS = 24_000_000;
        const MAX_CANVAS_SIDE = 16_384;
        const MAX_CANVAS_PIXELS = 64_000_000;

        uploadArea.addEventListener('click', ()=> fileInput.click());
        uploadArea.addEventListener('dragover', (e)=>{ e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', ()=> uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e)=>{ e.preventDefault(); uploadArea.classList.remove('dragover'); if(e.dataTransfer.files?.length){ handleFiles(e.dataTransfer.files); } });
        fileInput.addEventListener('change', (e)=>{ if(e.target.files?.length){ handleFiles(e.target.files); } });
        
        // 透明背景事件监听
        useTransparentBg.addEventListener('change', ()=>{
            transparentBgSize.classList.toggle('is-visible', useTransparentBg.checked);
            renderList(); // 重新渲染列表以更新背景标签和按钮状态
            scheduleGenerate();
        });
        
        transparentBgWidth.addEventListener('input', scheduleGenerate);
        transparentBgHeight.addEventListener('input', scheduleGenerate);
        window.addEventListener('pagehide', releaseItems);

        function handleFiles(fileList){
            const nextFiles = [];
            const rejected = [];
            Array.from(fileList).forEach((file)=>{
                if(!file.type.startsWith('image/')){
                    rejected.push(`${file.name} 不是图片文件`);
                    return;
                }
                if(file.size > MAX_FILE_BYTES){
                    rejected.push(`${file.name} 超过 50MB`);
                    return;
                }
                if(nextFiles.length < MAX_FILES) nextFiles.push(file);
            });
            if(fileList.length > MAX_FILES) rejected.push(`最多一次处理 ${MAX_FILES} 张图片，已忽略多余文件`);

            releaseItems();
            items = nextFiles.map(f=>({
                file: f,
                url: URL.createObjectURL(f),
                posMode: 'anchor',
                anchor: 'lt', // 左上
                customX: 0,
                customY: 0,
                opacity: 100
            }));
            fileInput.value = '';
            if(rejected.length) showErr(rejected.join('；'));
            else hideErr();
            renderList();
            scheduleGenerate();
        }

        function renderList(){
            listEl.replaceChildren();
            items.forEach((it, index)=>{
                const div = document.createElement('div');
                div.className = 'item';
                div.append(
                    createIndexNode(index),
                    createThumbNode(it),
                    createMetaNode(it, index),
                    createActionsNode(index)
                );

                // 初始化选择值
                const sel = div.querySelector('select[data-k="anchor"]');
                sel.value = it.posMode==='custom' ? 'custom' : it.anchor;
                const customWrap = div.querySelector('.custom');
                customWrap.classList.toggle('is-visible', sel.value==='custom');

                // 事件：位置选择
                sel.addEventListener('change', (e)=>{
                    const v = e.target.value;
                    if(v==='custom'){
                        it.posMode = 'custom';
                    }else{
                        it.posMode = 'anchor';
                        it.anchor = v;
                    }
                    customWrap.classList.toggle('is-visible', it.posMode==='custom');
                    scheduleGenerate();
                });

                // 事件：自定义坐标与透明度
                div.querySelectorAll('input[data-k]').forEach(input=>{
                    input.addEventListener('input', (e)=>{
                        const k = e.target.getAttribute('data-k');
                        let val = e.target.value;
                        if(k==='opacity'){
                            const num = Math.max(0, Math.min(100, parseInt(val||'0')));
                            it.opacity = num;
                            div.querySelector('[data-k="opv"]').textContent = num + '%';
                        }else{
                            const n = parseInt(val||'0');
                            if(k==='customX') it.customX = isNaN(n)?0:n;
                            if(k==='customY') it.customY = isNaN(n)?0:n;
                        }
                        scheduleGenerate();
                    });
                });

                // 上移
                div.querySelector('.btn.up').addEventListener('click', ()=>{
                    if(index>0){
                        const tmp = items[index-1];
                        items[index-1] = items[index];
                        items[index] = tmp;
                        renderList();
                        scheduleGenerate();
                    }
                });
                // 删除
                div.querySelector('.btn.del').addEventListener('click', ()=>{
                    URL.revokeObjectURL(items[index].url);
                    items.splice(index,1);
                    renderList();
                    scheduleGenerate();
                });

                listEl.appendChild(div);
            });
        }

        function createIndexNode(index){
            const node = document.createElement('div');
            node.className = 'idx';
            node.title = '序号';
            node.textContent = index + 1;
            return node;
        }

        function createThumbNode(item){
            const wrap = document.createElement('div');
            wrap.className = 'thumb';
            const img = document.createElement('img');
            img.src = item.url;
            img.alt = `${item.file.name} 缩略图`;
            img.decoding = 'async';
            wrap.appendChild(img);
            return wrap;
        }

        function createMetaNode(item, index){
            const meta = document.createElement('div');
            meta.className = 'meta';

            const badge = document.createElement('span');
            badge.className = 'badge';
            badge.textContent = index===0 && !useTransparentBg.checked ? '背景' : '叠加';

            const ctrl = document.createElement('div');
            ctrl.className = 'ctrl';

            const positionLabel = document.createElement('label');
            positionLabel.textContent = '位置';
            const select = document.createElement('select');
            select.dataset.k = 'anchor';
            [
                ['lt','左上'], ['lc','左中'], ['lb','左下'],
                ['ct','中上'], ['cc','中间'], ['cb','中下'],
                ['rt','右上'], ['rc','右中'], ['rb','右下'],
                ['custom','自定义坐标']
            ].forEach(([value, text])=>{
                const option = document.createElement('option');
                option.value = value;
                option.textContent = text;
                select.appendChild(option);
            });

            const custom = document.createElement('span');
            custom.className = 'ctrl custom';
            custom.append(
                createTextLabel('X'),
                createNumberInput('customX', item.customX),
                createTextLabel('Y'),
                createNumberInput('customY', item.customY)
            );

            const opacity = document.createElement('span');
            opacity.className = 'opacity';
            const opacityLabel = createTextLabel('透明度');
            const range = document.createElement('input');
            range.type = 'range';
            range.min = '0';
            range.max = '100';
            range.step = '1';
            range.dataset.k = 'opacity';
            range.value = item.opacity;
            const value = document.createElement('span');
            value.className = 'badge';
            value.dataset.k = 'opv';
            value.textContent = `${item.opacity}%`;
            opacity.append(opacityLabel, range, value);

            ctrl.append(positionLabel, select, custom, opacity);
            meta.append(badge, ctrl);
            return meta;
        }

        function createActionsNode(index){
            const actions = document.createElement('div');
            actions.className = 'item-actions';
            const up = document.createElement('button');
            up.className = 'btn up';
            up.type = 'button';
            up.title = '上移';
            up.textContent = '上移';
            up.disabled = index === 0;
            const del = document.createElement('button');
            del.className = 'btn del';
            del.type = 'button';
            del.title = '删除';
            del.textContent = '删除';
            actions.append(up, del);
            return actions;
        }

        function createTextLabel(text){
            const label = document.createElement('label');
            label.textContent = text;
            return label;
        }

        function createNumberInput(key, value){
            const input = document.createElement('input');
            input.type = 'number';
            input.dataset.k = key;
            input.value = value;
            input.className = 'coord-input';
            return input;
        }

        async function generate(){
            const token = ++renderToken;
            hideErr();
            if(items.length < 1 && !useTransparentBg.checked){
                ctx.clearRect(0,0,canvas.width||0,canvas.height||0);
                dlBtn.disabled = true;
                return;
            }

            try{
                await Promise.all(items.map(loadItemImage));
            }catch(ex){
                return showErr('有图片加载失败，请重试');
            }
            if(token !== renderToken) return;
            
            // 如果使用透明背景
            if(useTransparentBg.checked){
                const width = sanitizeCanvasSize(transparentBgWidth.value, 200);
                const height = sanitizeCanvasSize(transparentBgHeight.value, 300);
                transparentBgWidth.value = width;
                transparentBgHeight.value = height;
                if(!canUseCanvasSize(width, height)){
                    dlBtn.disabled = true;
                    return showErr('输出尺寸过大，请降低透明背景宽高。');
                }
                canvas.width = width;
                canvas.height = height;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                // 透明背景不需要绘制任何内容
            } else {
                const bg = items[0].img;
                if(!bg){ return showErr('背景图片加载失败'); }
                // 以背景尺寸作为画布
                if(!canUseCanvasSize(bg.width, bg.height)){
                    dlBtn.disabled = true;
                    return showErr('背景图片尺寸过大，无法安全生成预览。');
                }
                canvas.width = bg.width; canvas.height = bg.height;
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.globalAlpha = 1;
                ctx.drawImage(bg, 0, 0);
            }

            // 绘制叠加图片
            const startIndex = useTransparentBg.checked ? 0 : 1;
            for(let i=startIndex;i<items.length;i++){
                const it = items[i];
                const img = it.img; if(!img) continue;
                const pos = computePosition(it, canvas.width, canvas.height, img.width, img.height);
                ctx.save();
                ctx.globalAlpha = Math.max(0, Math.min(1, it.opacity/100));
                ctx.drawImage(img, pos.x, pos.y);
                ctx.restore();
            }
            dlBtn.disabled = false;
        }

        let genTimer = null;
        function scheduleGenerate(){
            if(genTimer) cancelAnimationFrame(genTimer);
            genTimer = requestAnimationFrame(()=>{ generate(); });
        }

        dlBtn.addEventListener('click', ()=>{
            if(dlBtn.disabled) return;
            if(!canvas.toBlob){
                return showErr('当前浏览器不支持导出画布图片，请更新浏览器后重试。');
            }
            dlBtn.disabled = true;
            const a = document.createElement('a');
            canvas.toBlob((blob)=>{
                dlBtn.disabled = false;
                if(!blob) return showErr('导出失败，请降低图片尺寸后重试。');
                const url = URL.createObjectURL(blob);
                a.href = url;
                a.download = getDownloadName();
                a.click();
                setTimeout(()=>URL.revokeObjectURL(url), 0);
            }, 'image/png');
        });

        function getDownloadName(){
            const bg = items[0]?.file?.name || 'image-overlay';
            const base = (bg.replace(/\.[^.]*$/, '') || 'image-overlay').replace(/[\\/:*?"<>|]+/g, '-');
            return base + '-overlay.png';
        }

        function loadItemImage(it){
            if(it.img && it.img.complete) return Promise.resolve();
            return new Promise((resolve, reject)=>{
                const img = new Image();
                img.onload = ()=>{
                    if(!canUseCanvasSize(img.width, img.height)){
                        reject(new Error('too large'));
                        return;
                    }
                    it.img = img;
                    resolve();
                };
                img.onerror = ()=> reject(new Error('load fail'));
                img.src = it.url;
            });
        }

        function computePosition(it, bgW, bgH, w, h){
            if(it.posMode === 'custom'){
                return { x: it.customX|0, y: it.customY|0 };
            }
            const map = {
                lt: { x: 0, y: 0 },
                lc: { x: 0, y: (bgH - h)/2 },
                lb: { x: 0, y: bgH - h },
                ct: { x: (bgW - w)/2, y: 0 },
                cc: { x: (bgW - w)/2, y: (bgH - h)/2 },
                cb: { x: (bgW - w)/2, y: bgH - h },
                rt: { x: bgW - w, y: 0 },
                rc: { x: bgW - w, y: (bgH - h)/2 },
                rb: { x: bgW - w, y: bgH - h }
            };
            const p = map[it.anchor] || map.lt;
            return { x: Math.round(p.x), y: Math.round(p.y) };
        }

        function sanitizeCanvasSize(value, fallback){
            const next = Number.parseInt(value, 10);
            return Number.isNaN(next) ? fallback : Math.max(1, Math.min(4000, next));
        }

        function canUseCanvasSize(width, height){
            return width > 0 && height > 0 && width <= MAX_CANVAS_SIDE && height <= MAX_CANVAS_SIDE && width * height <= MAX_CANVAS_PIXELS && width * height <= MAX_IMAGE_PIXELS;
        }

        function releaseItems(){
            renderToken++;
            items.forEach((item)=>URL.revokeObjectURL(item.url));
            items = [];
        }

        function hideErr(){
            errEl.textContent = '';
            errEl.hidden = true;
        }

        function showErr(m){
            errEl.textContent = m;
            errEl.hidden = false;
        }
    </script>
</body>
</html>
