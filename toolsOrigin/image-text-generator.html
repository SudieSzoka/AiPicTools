<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>带主题色分析的文字图片生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; background: #f5f7fb; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); overflow: hidden; }
        .header { background: linear-gradient(135deg, #6366f1, #3b82f6); color: #fff; padding: 22px 26px; }
        .header h1 { font-size: 20px; font-weight: 600; }
        .main { display: flex; gap: 0; }
        .left, .right { padding: 20px; }
        .left { width: 42%; border-right: 1px solid #eef2f7; }
        .right { width: 58%; }
        .section-title { font-size: 16px; color: #111827; margin-bottom: 12px; font-weight: 600; }
        .upload-area { border: 2px dashed #cbd5e1; border-radius: 10px; padding: 24px; min-height: 200px; text-align: center; background:#f8fafc; transition:.2s; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; }
        .upload-area:hover { border-color:#60a5fa; background:#f1f5f9; }
        .upload-area:focus-visible { outline: 3px solid #93c5fd; outline-offset: 2px; }
        .upload-area.dragover { border-color:#22c55e; background:#ecfdf5; }
        .upload-area span { color:#475569; font-size:14px; }
        .visually-hidden { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
        .preview-wrap { margin-top: 14px; display:flex; gap:12px; align-items:flex-start; }
        .preview-wrap[hidden], .status[hidden] { display:none !important; }
        .thumb { flex:0 0 auto; width: 140px; height: 140px; background:#f1f5f9; border:1px solid #e2e8f0; border-radius:8px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .thumb img { max-width: 100%; max-height: 100%; display:block; }
        .meta { flex:1; font-size:14px; color:#374151; display:flex; flex-direction:column; gap:8px; }
        .badge { display:inline-block; background:#eef2ff; color:#3730a3; padding:4px 8px; border-radius:999px; font-size:12px; }
        .colors { display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; list-style:none; }
        .color-chip { display:flex; align-items:center; gap:8px; padding:6px 8px; border:1px solid #e5e7eb; border-radius:8px; cursor:pointer; user-select:none; background:#fff; color:#374151; font:inherit; }
        .color-chip.compact { padding:4px 6px; }
        .color-chip:focus-visible { outline: 3px solid #93c5fd; outline-offset: 2px; }
        .swatch { width:20px; height:20px; border-radius:4px; border:1px solid #e5e7eb; flex:0 0 auto; }
        .chip-text { font-size:12px; color:#374151; }
        .form-row { display:flex; gap:12px; align-items:center; margin-bottom:12px; flex-wrap: wrap; }
        .form-row label { font-size:13px; color:#374151; min-width:72px; }
        .form-row input[type="number"], .form-row input[type="text"], .form-row select { border:1px solid #e5e7eb; border-radius:8px; padding:8px 10px; font-size:14px; background:#fff; }
        .form-row input[type="text"] { min-width: 220px; flex: 1 1 260px; }
        .form-row input[type="color"] { width: 44px; height: 34px; border:1px solid #e5e7eb; border-radius:6px; padding:0; }
        .inline-colors { display:flex; flex-wrap:wrap; gap:6px; margin-left:8px; }
        .canvas-wrap { background: #1e3a8a; border:1px solid #e5e7eb; border-radius:10px; padding:16px; display:flex; align-items:center; justify-content:center; min-height:320px; }
        canvas { max-width:100%; height:auto; background: repeating-conic-gradient(#f3f4f6 0% 25%, #fff 0% 50%) 50% / 20px 20px; }
        .actions { margin-top: 14px; margin-bottom: 14px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
        .btn { background:#3b82f6; color:#fff; border:none; padding:10px 16px; border-radius:8px; cursor:pointer; font-size:14px; }
        .btn.secondary { background:#10b981; }
        .btn:disabled { opacity:.55; cursor:not-allowed; }
        .hint { font-size:12px; color:#6b7280; }
        .status { color:#dc2626; font-size:13px; }
        .status.success { color:#047857; }
        @media (max-width: 900px) { .main{ flex-direction:column; } .left, .right{ width:100%; border-right:none; border-top:1px solid #eef2f7; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header" aria-label="文字图片生成工具标题"><h1>带主题色分析的文字图片生成器</h1></header>
        <main class="main">
            <section class="left" aria-labelledby="uploadTitle">
                <h2 id="uploadTitle" class="section-title">1) 选择或拖拽图片（用于分析主题色）</h2>
                <label id="uploadArea" class="upload-area" for="fileInput" tabindex="0" aria-describedby="uploadHelp">
                    <strong>点击选择图片或拖拽图片到此处</strong>
                    <span id="uploadHelp">支持 PNG、JPG、WebP、GIF、BMP；最大 50 MB、2400 万像素。</span>
                </label>
                <input id="fileInput" class="visually-hidden" type="file" accept="image/png,image/jpeg,image/webp,image/gif,image/bmp" aria-label="选择用于分析主题色的图片" tabindex="-1">
                <div class="preview-wrap" id="leftPreview" hidden>
                    <div id="thumbBox" class="thumb"></div>
                    <div class="meta">
                        <div><span class="badge">图片信息</span></div>
                        <div id="imgSize" aria-live="polite">-</div>
                        <div><span class="badge">主题色域（抽样）</span></div>
                        <ul id="colorList" class="colors"></ul>
                    </div>
                </div>
            </section>
            <section class="right" aria-labelledby="generateTitle">
                <h2 id="generateTitle" class="section-title">2) 生成文字图片（透明背景）</h2>
                <div class="form-row">
                    <label for="cw">画布宽度</label>
                    <input id="cw" type="number" value="800" min="1" max="8192" inputmode="numeric">
                    <label for="ch">画布高度</label>
                    <input id="ch" type="number" value="300" min="1" max="8192" inputmode="numeric">
                    <span class="hint">上传后会自动更新，输出不超过 3200 万像素</span>
                </div>
                <div class="form-row">
                    <label for="textInput">文字内容</label>
                    <input id="textInput" type="text" placeholder="输入文字..." value="Hello AiPicTools" maxlength="500">
                </div>
                <div class="form-row">
                    <label for="fontFamily">字体</label>
                    <select id="fontFamily">
                        <option value="'Microsoft YaHei', Arial, sans-serif">微软雅黑 / 系统</option>
                        <option value="Helvetica, Arial, sans-serif">Helvetica</option>
                        <option value="Georgia, serif">Georgia</option>
                        <option value="'Courier New', monospace">Courier New</option>
                        <optgroup id="customFontGroup" label="自定义字体"></optgroup>
                    </select>
                    <input id="fontFile" class="visually-hidden" type="file" accept=".ttf,.otf,.woff,.woff2,font/ttf,font/otf,font/woff,font/woff2" aria-label="上传自定义字体文件" tabindex="-1">
                    <button id="uploadFontBtn" class="btn" type="button">上传字体</button>
                    <label for="fontSize">字号(px)</label>
                    <input id="fontSize" type="number" value="80" min="1" max="512" inputmode="numeric">
                    <label for="fontColor">颜色</label>
                    <input id="fontColor" type="color" value="#ffffff">
                    <div id="inlineFontColors" class="inline-colors" role="group" aria-label="字体颜色快捷色卡"></div>
                </div>
                <div class="form-row">
                    <label for="strokeWidth">描边宽度</label>
                    <input id="strokeWidth" type="number" value="0" min="0" max="300" inputmode="numeric">
                    <label for="strokeColor">描边颜色</label>
                    <input id="strokeColor" type="color" value="#000000">
                    <div id="inlineStrokeColors" class="inline-colors" role="group" aria-label="描边颜色快捷色卡"></div>
                </div>
                <div class="form-row">
                    <label for="bgMode">背景</label>
                    <select id="bgMode">
                        <option value="transparent">透明</option>
                        <option value="solid">纯色</option>
                    </select>
                    <label for="bgColor">背景颜色</label>
                    <input id="bgColor" type="color" value="#000000">
                    <div id="inlineBgColors" class="inline-colors" role="group" aria-label="背景颜色快捷色卡"></div>
                </div>
                <div class="form-row">
                    <label for="shadowDir">阴影方向</label>
                    <select id="shadowDir">
                        <option value="none">无</option>
                        <option value="right-bottom">右下</option>
                        <option value="right-top">右上</option>
                        <option value="left-bottom">左下</option>
                        <option value="left-top">左上</option>
                        <option value="bottom">正下</option>
                    </select>
                    <label for="shadowWidth">阴影宽度</label>
                    <input id="shadowWidth" type="number" value="0" min="0" max="300" inputmode="numeric">
                    <label for="shadowColor">阴影颜色</label>
                    <input id="shadowColor" type="color" value="#000000">
                    <div id="inlineShadowColors" class="inline-colors" role="group" aria-label="阴影颜色快捷色卡"></div>
                </div>
                <div class="actions">
                    <button id="dlBtn" class="btn secondary" type="button">下载为 PNG</button>
                    <div id="err" class="status" role="alert" aria-live="assertive" hidden></div>
                </div>
                <div class="canvas-wrap">
                    <canvas id="outCanvas" width="800" height="300" role="img" aria-label="文字图片输出预览">当前浏览器不支持 Canvas。</canvas>
                </div>
            </section>
        </main>
    </div>

    <script>
        (() => {
            'use strict';

            const MAX_IMAGE_FILE_SIZE = 50 * 1024 * 1024;
            const MAX_FONT_FILE_SIZE = 20 * 1024 * 1024;
            const MAX_IMAGE_PIXELS = 24000000;
            const MAX_CANVAS_SIDE = 8192;
            const MAX_CANVAS_PIXELS = 32000000;
            const MAX_TEXT_LENGTH = 500;
            const MAX_FONT_SIZE = 512;
            const MAX_STROKE_WIDTH = 300;
            const MAX_SHADOW_WIDTH = 300;
            const MAX_SAMPLE_SIDE = 120;
            const MAX_CUSTOM_FONTS = 10;
            const ACCEPTED_IMAGE_TYPES = new Set(['image/png', 'image/jpeg', 'image/webp', 'image/gif', 'image/bmp']);
            const IMAGE_EXTENSION_RE = /\.(png|jpe?g|webp|gif|bmp)$/i;
            const FONT_EXTENSION_RE = /\.(ttf|otf|woff2?)$/i;

            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const leftPreview = document.getElementById('leftPreview');
            const thumbBox = document.getElementById('thumbBox');
            const imgSize = document.getElementById('imgSize');
            const colorList = document.getElementById('colorList');
            const cw = document.getElementById('cw');
            const ch = document.getElementById('ch');
            const textInput = document.getElementById('textInput');
            const fontFamily = document.getElementById('fontFamily');
            const customFontGroup = document.getElementById('customFontGroup');
            const fontFileInput = document.getElementById('fontFile');
            const uploadFontBtn = document.getElementById('uploadFontBtn');
            const fontSize = document.getElementById('fontSize');
            const fontColor = document.getElementById('fontColor');
            const strokeWidth = document.getElementById('strokeWidth');
            const strokeColor = document.getElementById('strokeColor');
            const bgMode = document.getElementById('bgMode');
            const bgColor = document.getElementById('bgColor');
            const shadowDir = document.getElementById('shadowDir');
            const shadowWidth = document.getElementById('shadowWidth');
            const shadowColor = document.getElementById('shadowColor');
            const inlineFontColors = document.getElementById('inlineFontColors');
            const inlineStrokeColors = document.getElementById('inlineStrokeColors');
            const inlineBgColors = document.getElementById('inlineBgColors');
            const inlineShadowColors = document.getElementById('inlineShadowColors');
            const outCanvas = document.getElementById('outCanvas');
            const ctx = outCanvas.getContext('2d');
            const dlBtn = document.getElementById('dlBtn');
            const statusBox = document.getElementById('err');
            const colorTargetInputs = {
                font: fontColor,
                stroke: strokeColor,
                bg: bgColor,
                shadow: shadowColor
            };
            const colorTargetLabels = {
                font: '字体颜色',
                stroke: '描边颜色',
                bg: '背景颜色',
                shadow: '阴影颜色'
            };

            let uploadedFileName = '';
            let currentColorTarget = 'font';
            let currentImageUrl = '';
            let imageLoadToken = 0;
            let statusTimer = 0;
            let customFontCount = 0;
            let thumbImg = null;

            uploadArea.addEventListener('keydown', (event) => {
                if (event.key === 'Enter' || event.key === ' ') {
                    event.preventDefault();
                    fileInput.click();
                }
            });
            uploadArea.addEventListener('dragenter', (event) => {
                event.preventDefault();
                uploadArea.classList.add('dragover');
            });
            uploadArea.addEventListener('dragover', (event) => {
                event.preventDefault();
                if (event.dataTransfer) {
                    event.dataTransfer.dropEffect = 'copy';
                }
                uploadArea.classList.add('dragover');
            });
            uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
            uploadArea.addEventListener('drop', (event) => {
                event.preventDefault();
                uploadArea.classList.remove('dragover');
                const file = event.dataTransfer && event.dataTransfer.files && event.dataTransfer.files[0];
                if (file) {
                    handleFile(file);
                }
            });
            fileInput.addEventListener('change', (event) => {
                const file = event.target.files && event.target.files[0];
                if (file) {
                    handleFile(file);
                }
                event.target.value = '';
            });

            function handleFile(file) {
                const token = ++imageLoadToken;
                if (!isAcceptedImage(file)) {
                    showStatus('仅支持 PNG、JPG、WebP、GIF、BMP 图片。');
                    return;
                }
                if (file.size > MAX_IMAGE_FILE_SIZE) {
                    showStatus(`图片不能超过 ${formatBytes(MAX_IMAGE_FILE_SIZE)}。`);
                    return;
                }

                const objectUrl = URL.createObjectURL(file);
                const img = new Image();
                img.decoding = 'async';
                img.onload = () => {
                    if (token !== imageLoadToken) {
                        URL.revokeObjectURL(objectUrl);
                        return;
                    }

                    const width = img.naturalWidth;
                    const height = img.naturalHeight;
                    const pixels = width * height;
                    if (!width || !height) {
                        URL.revokeObjectURL(objectUrl);
                        showStatus('图片尺寸读取失败，请更换图片。');
                        return;
                    }
                    if (width > MAX_CANVAS_SIDE || height > MAX_CANVAS_SIDE || pixels > MAX_IMAGE_PIXELS) {
                        URL.revokeObjectURL(objectUrl);
                        showStatus(`图片尺寸过大，最长边不超过 ${MAX_CANVAS_SIDE}px，总像素不超过 ${formatNumber(MAX_IMAGE_PIXELS)}。`);
                        return;
                    }

                    revokeCurrentImageUrl();
                    currentImageUrl = objectUrl;
                    uploadedFileName = file.name || '';
                    setPreviewImage(currentImageUrl);
                    leftPreview.hidden = false;
                    imgSize.textContent = `尺寸：${width} × ${height}，文件：${formatBytes(file.size)}`;
                    cw.value = String(width);
                    ch.value = String(height);

                    renderColorMessage('正在分析主题色...');
                    if (resizeCanvas({ silent: true })) {
                        drawOutput();
                    }

                    try {
                        const colors = analyzeColors(img);
                        if (token === imageLoadToken) {
                            renderColors(colors);
                            clearStatus();
                        }
                    } catch (error) {
                        if (token === imageLoadToken) {
                            renderColorMessage('主题色分析失败。');
                            showStatus('主题色分析失败，请尝试换一张图片。');
                        }
                    }
                };
                img.onerror = () => {
                    URL.revokeObjectURL(objectUrl);
                    if (token === imageLoadToken) {
                        showStatus('图片解码失败，请确认文件没有损坏。');
                    }
                };
                img.src = objectUrl;
            }

            function isAcceptedImage(file) {
                if (!file) {
                    return false;
                }
                return ACCEPTED_IMAGE_TYPES.has(file.type) || IMAGE_EXTENSION_RE.test(file.name || '');
            }

            function setPreviewImage(url) {
                if (!thumbImg) {
                    thumbImg = document.createElement('img');
                    thumbImg.alt = '已上传图片预览';
                    thumbBox.replaceChildren(thumbImg);
                }
                thumbImg.src = url;
            }

            function revokeCurrentImageUrl() {
                if (currentImageUrl) {
                    URL.revokeObjectURL(currentImageUrl);
                    currentImageUrl = '';
                }
            }

            function showStatus(message, type = 'error', autoHide = false) {
                window.clearTimeout(statusTimer);
                statusBox.textContent = message;
                statusBox.classList.toggle('success', type === 'success');
                statusBox.hidden = !message;
                if (message && autoHide) {
                    statusTimer = window.setTimeout(clearStatus, 3000);
                }
            }

            function clearStatus() {
                window.clearTimeout(statusTimer);
                statusBox.textContent = '';
                statusBox.classList.remove('success');
                statusBox.hidden = true;
            }

            function resizeCanvas(options = {}) {
                const dimensions = getCanvasDimensions();
                if (!dimensions.ok) {
                    dlBtn.disabled = true;
                    if (!options.silent) {
                        showStatus(dimensions.message);
                    }
                    return false;
                }
                if (outCanvas.width !== dimensions.width) {
                    outCanvas.width = dimensions.width;
                }
                if (outCanvas.height !== dimensions.height) {
                    outCanvas.height = dimensions.height;
                }
                dlBtn.disabled = false;
                return true;
            }

            function getCanvasDimensions() {
                const width = Number(cw.value);
                const height = Number(ch.value);
                if (!Number.isInteger(width) || !Number.isInteger(height)) {
                    return { ok: false, message: '画布宽高必须是整数。' };
                }
                if (width < 1 || height < 1) {
                    return { ok: false, message: '画布宽高必须大于 0。' };
                }
                if (width > MAX_CANVAS_SIDE || height > MAX_CANVAS_SIDE) {
                    return { ok: false, message: `画布宽高不能超过 ${MAX_CANVAS_SIDE}px。` };
                }
                if (width * height > MAX_CANVAS_PIXELS) {
                    return { ok: false, message: `画布总像素不能超过 ${formatNumber(MAX_CANVAS_PIXELS)}。` };
                }
                return { ok: true, width, height };
            }

            function drawOutput() {
                const width = outCanvas.width;
                const height = outCanvas.height;
                ctx.clearRect(0, 0, width, height);

                if (bgMode.value === 'solid') {
                    ctx.save();
                    ctx.shadowColor = 'transparent';
                    ctx.fillStyle = bgColor.value;
                    ctx.fillRect(0, 0, width, height);
                    ctx.restore();
                }

                const text = textInput.value.slice(0, MAX_TEXT_LENGTH);
                const size = readLimitedNumber(fontSize, 1, MAX_FONT_SIZE, 80);
                const family = fontFamily.value || "'Microsoft YaHei', Arial, sans-serif";
                ctx.font = `${size}px ${family}`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = fontColor.value;

                const shadow = readLimitedNumber(shadowWidth, 0, MAX_SHADOW_WIDTH, 0);
                const offset = getShadowOffset(shadowDir.value, shadow);
                ctx.shadowColor = shadow > 0 ? shadowColor.value : 'transparent';
                ctx.shadowBlur = shadow;
                ctx.shadowOffsetX = offset.x;
                ctx.shadowOffsetY = offset.y;

                const lineWidth = readLimitedNumber(strokeWidth, 0, MAX_STROKE_WIDTH, 0);
                if (lineWidth > 0) {
                    ctx.lineWidth = lineWidth;
                    ctx.strokeStyle = strokeColor.value;
                    ctx.strokeText(text, width / 2, height / 2);
                }
                ctx.fillText(text, width / 2, height / 2);
            }

            function getShadowOffset(direction, width) {
                switch (direction) {
                    case 'right-bottom':
                        return { x: width, y: width };
                    case 'right-top':
                        return { x: width, y: -width };
                    case 'left-bottom':
                        return { x: -width, y: width };
                    case 'left-top':
                        return { x: -width, y: -width };
                    case 'bottom':
                        return { x: 0, y: width };
                    default:
                        return { x: 0, y: 0 };
                }
            }

            uploadFontBtn.addEventListener('click', () => fontFileInput.click());
            fontFileInput.addEventListener('change', async (event) => {
                const file = event.target.files && event.target.files[0];
                if (!file) {
                    return;
                }

                uploadFontBtn.disabled = true;
                try {
                    if (!('FontFace' in window) || !document.fonts) {
                        showStatus('当前浏览器不支持动态字体加载。');
                        return;
                    }
                    if (!FONT_EXTENSION_RE.test(file.name || '')) {
                        showStatus('字体仅支持 .ttf、.otf、.woff、.woff2。');
                        return;
                    }
                    if (file.size > MAX_FONT_FILE_SIZE) {
                        showStatus(`字体文件不能超过 ${formatBytes(MAX_FONT_FILE_SIZE)}。`);
                        return;
                    }
                    if (customFontCount >= MAX_CUSTOM_FONTS) {
                        showStatus(`最多加载 ${MAX_CUSTOM_FONTS} 个自定义字体。`);
                        return;
                    }

                    const arrayBuffer = await file.arrayBuffer();
                    const familyName = buildFontFamilyName(file.name);
                    const fontFace = new FontFace(familyName, arrayBuffer);
                    await fontFace.load();
                    document.fonts.add(fontFace);

                    const option = document.createElement('option');
                    option.value = quoteFontFamily(familyName);
                    option.textContent = `${familyName}（自定义）`;
                    customFontGroup.appendChild(option);
                    fontFamily.value = option.value;
                    customFontCount += 1;
                    if (resizeCanvas({ silent: true })) {
                        drawOutput();
                    }
                    showStatus(`已加载字体：${familyName}`, 'success', true);
                } catch (error) {
                    showStatus('字体加载失败，请尝试更换文件。');
                } finally {
                    uploadFontBtn.disabled = false;
                    event.target.value = '';
                }
            });

            function analyzeColors(img) {
                const scale = Math.min(MAX_SAMPLE_SIDE / img.naturalWidth, MAX_SAMPLE_SIDE / img.naturalHeight, 1);
                const sampleWidth = Math.max(1, Math.round(img.naturalWidth * scale));
                const sampleHeight = Math.max(1, Math.round(img.naturalHeight * scale));
                const canvas = document.createElement('canvas');
                const sampleCtx = canvas.getContext('2d', { willReadFrequently: true });
                canvas.width = sampleWidth;
                canvas.height = sampleHeight;
                sampleCtx.drawImage(img, 0, 0, sampleWidth, sampleHeight);
                const { data } = sampleCtx.getImageData(0, 0, sampleWidth, sampleHeight);
                const buckets = new Map();
                let total = 0;

                for (let index = 0; index < data.length; index += 4) {
                    const alpha = data[index + 3];
                    if (alpha < 10) {
                        continue;
                    }
                    const red = data[index];
                    const green = data[index + 1];
                    const blue = data[index + 2];
                    const key = `${red >> 5},${green >> 5},${blue >> 5}`;
                    const bucket = buckets.get(key) || { count: 0, red: 0, green: 0, blue: 0 };
                    bucket.count += 1;
                    bucket.red += red;
                    bucket.green += green;
                    bucket.blue += blue;
                    buckets.set(key, bucket);
                    total += 1;
                }

                if (!total) {
                    return [];
                }

                return Array.from(buckets.values())
                    .map((bucket) => {
                        const red = Math.round(bucket.red / bucket.count);
                        const green = Math.round(bucket.green / bucket.count);
                        const blue = Math.round(bucket.blue / bucket.count);
                        return {
                            red,
                            green,
                            blue,
                            hex: rgbToHex(red, green, blue),
                            count: bucket.count,
                            ratio: bucket.count / total
                        };
                    })
                    .filter((item) => item.ratio >= 0.01)
                    .sort((first, second) => second.count - first.count)
                    .slice(0, 12);
            }

            function renderColors(list) {
                colorList.replaceChildren();
                clearInlineColorLists();

                if (!list.length) {
                    renderColorMessage('未找到占比超过 1% 的非透明主题色。');
                    return;
                }

                list.forEach((item) => {
                    const label = `RGB(${item.red},${item.green},${item.blue}) / ${item.hex} / ${(item.ratio * 100).toFixed(1)}%`;
                    const listItem = document.createElement('li');
                    const button = createColorButton(item.hex, label, `应用 ${item.hex} 到${colorTargetLabels[currentColorTarget]}`, () => {
                        applyColorToTarget(item.hex, currentColorTarget);
                    });
                    button.title = '点击应用到最近聚焦的颜色输入';
                    listItem.appendChild(button);
                    colorList.appendChild(listItem);
                });

                renderInlineColorList(inlineFontColors, list, 'font');
                renderInlineColorList(inlineStrokeColors, list, 'stroke');
                renderInlineColorList(inlineBgColors, list, 'bg');
                renderInlineColorList(inlineShadowColors, list, 'shadow');
            }

            function renderColorMessage(message) {
                colorList.replaceChildren();
                clearInlineColorLists();
                const listItem = document.createElement('li');
                listItem.className = 'hint';
                listItem.textContent = message;
                colorList.appendChild(listItem);
            }

            function clearInlineColorLists() {
                [inlineFontColors, inlineStrokeColors, inlineBgColors, inlineShadowColors].forEach((container) => {
                    container.replaceChildren();
                });
            }

            function renderInlineColorList(container, list, target) {
                container.replaceChildren();
                list.forEach((item) => {
                    const button = createColorButton(item.hex, '', `应用 ${item.hex} 到${colorTargetLabels[target]}`, () => {
                        applyColorToTarget(item.hex, target);
                    });
                    button.classList.add('compact');
                    button.title = `点击应用到${colorTargetLabels[target]}`;
                    container.appendChild(button);
                });
            }

            function createColorButton(hex, label, ariaLabel, onPick) {
                const button = document.createElement('button');
                button.type = 'button';
                button.className = 'color-chip';
                button.setAttribute('aria-label', ariaLabel);

                const swatch = document.createElement('span');
                swatch.className = 'swatch';
                swatch.style.backgroundColor = hex;
                swatch.setAttribute('aria-hidden', 'true');
                button.appendChild(swatch);

                if (label) {
                    const text = document.createElement('span');
                    text.className = 'chip-text';
                    text.textContent = label;
                    button.appendChild(text);
                }

                button.addEventListener('click', onPick);
                return button;
            }

            function applyColorToTarget(hex, target) {
                const input = colorTargetInputs[target] || fontColor;
                input.value = hex;
                currentColorTarget = target;
                if (resizeCanvas({ silent: true })) {
                    drawOutput();
                    clearStatus();
                }
            }

            function rgbToHex(red, green, blue) {
                return `#${toHex(red)}${toHex(green)}${toHex(blue)}`;
            }

            function toHex(value) {
                return Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
            }

            function readLimitedNumber(input, min, max, fallback) {
                const parsed = Number(input.value);
                if (!Number.isFinite(parsed)) {
                    return fallback;
                }
                return Math.max(min, Math.min(max, Math.trunc(parsed)));
            }

            function clampNumberInput(input, min, max, fallback) {
                const nextValue = readLimitedNumber(input, min, max, fallback);
                input.value = String(nextValue);
            }

            function formatBytes(bytes) {
                if (bytes >= 1024 * 1024) {
                    return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
                }
                if (bytes >= 1024) {
                    return `${(bytes / 1024).toFixed(1)} KB`;
                }
                return `${bytes} B`;
            }

            function formatNumber(value) {
                return value.toLocaleString('zh-CN');
            }

            function buildFontFamilyName(fileName) {
                const baseName = (fileName || 'CustomFont').replace(/\.[^.]*$/, '');
                const cleanName = baseName.replace(/[^\w\u4e00-\u9fa5-]+/g, ' ').trim() || 'CustomFont';
                return `${cleanName.slice(0, 40)} ${customFontCount + 1}`.trim();
            }

            function quoteFontFamily(familyName) {
                return `'${familyName.replace(/\\/g, '\\\\').replace(/'/g, "\\'")}'`;
            }

            function updateOutput() {
                if (resizeCanvas()) {
                    drawOutput();
                    clearStatus();
                }
            }

            const controls = [cw, ch, textInput, fontFamily, fontSize, fontColor, strokeWidth, strokeColor, bgMode, bgColor, shadowDir, shadowWidth, shadowColor];
            controls.forEach((control) => {
                control.addEventListener('input', updateOutput);
                control.addEventListener('change', () => {
                    if (control === fontSize) {
                        clampNumberInput(fontSize, 1, MAX_FONT_SIZE, 80);
                    } else if (control === strokeWidth) {
                        clampNumberInput(strokeWidth, 0, MAX_STROKE_WIDTH, 0);
                    } else if (control === shadowWidth) {
                        clampNumberInput(shadowWidth, 0, MAX_SHADOW_WIDTH, 0);
                    }
                    updateOutput();
                });
            });

            [
                [fontColor, 'font'],
                [strokeColor, 'stroke'],
                [bgColor, 'bg'],
                [shadowColor, 'shadow']
            ].forEach(([input, target]) => {
                input.addEventListener('focus', () => {
                    currentColorTarget = target;
                });
            });

            dlBtn.addEventListener('click', () => {
                if (!resizeCanvas()) {
                    return;
                }
                drawOutput();
                dlBtn.disabled = true;
                outCanvas.toBlob((blob) => {
                    dlBtn.disabled = false;
                    if (!blob) {
                        showStatus('导出失败，请降低画布尺寸后重试。');
                        return;
                    }
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = buildDownloadName();
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                    window.setTimeout(() => URL.revokeObjectURL(url), 1000);
                }, 'image/png');
            });

            function buildDownloadName() {
                if (!uploadedFileName) {
                    return 'text-image.png';
                }
                const baseName = uploadedFileName.replace(/\.[^.]*$/, '').replace(/[\\/:*?"<>|]+/g, '-').trim();
                return `${baseName || 'text-image'}-text.png`;
            }

            window.addEventListener('pagehide', revokeCurrentImageUrl);

            resizeCanvas({ silent: true });
            drawOutput();
        })();
    </script>
</body>
</html>
