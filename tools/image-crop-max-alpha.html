<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图像透明区域裁剪工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin: 30px 0;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        
        .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        .content {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin-bottom: 40px;
        }
        
        .upload-area {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            padding: 30px;
            flex: 1;
            min-width: 300px;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .drop-zone {
            width: 100%;
            height: 200px;
            border: 3px dashed #3498db;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            background: #f8fafc;
        }
        
        .drop-zone:hover, .drop-zone.dragover {
            background: #e3f2fd;
            border-color: #2980b9;
        }
        
        .drop-zone i {
            font-size: 48px;
            color: #3498db;
            margin-bottom: 15px;
        }
        
        .drop-zone p {
            color: #7f8c8d;
            font-size: 1.1rem;
            text-align: center;
        }
        
        .button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }
        
        .button:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(52, 152, 219, 0.4);
        }
        
        .button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .preview-area {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            padding: 30px;
            flex: 1;
            min-width: 300px;
            max-width: 500px;
            display: flex;
            flex-direction: column;
        }
        
        .preview-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        
        h2 {
            color: #2c3e50;
            font-size: 1.5rem;
        }
        
        .image-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .image-box {
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
            background: 
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%, transparent 75%, #f0f0f0 75%),
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
        }
        
        .image-box.original {
            background: #ffffff;
            border: 2px solid #e0e0e0;
        }
        
        .image-box img {
            display: block;
            max-width: 100%;
            max-height: 300px;
            margin: 0 auto;
        }
        
        .image-label {
            text-align: center;
            background: #f8f9fa;
            padding: 8px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        .info-area {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            padding: 25px;
            margin-top: 20px;
            max-width: 1000px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .info-card {
            background: #f8fafc;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #3498db;
        }
        
        .info-card h3 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.2rem;
        }
        
        .info-card p {
            color: #7f8c8d;
            line-height: 1.6;
        }
        
        .hidden {
            display: none;
        }
        
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            text-align: center;
            font-weight: 500;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        @media (max-width: 768px) {
            .content {
                flex-direction: column;
            }
            
            .upload-area, .preview-area {
                max-width: 100%;
            }
        }
    </style>

  <link rel="stylesheet" href="styles/common.css">

  <script src="scripts/common.js" defer></script>

<body class="tool-page" data-tool-page="image-crop-max-alpha">
<!-- COMMON_HEADER -->

<header class="page-header" aria-label="站点页头">
    <div class="header-container">
        <div class="header-inner">
            <div class="logo">
                <a href="../index.html" class="logo-link" aria-label="我的工具站首页">
                    <img class="brand-mark" src="../icon/aipictools.png" alt="">
                    <span>我的工具站</span>
                </a>
            </div>
            <nav class="nav-desktop" aria-label="主要导航">
                <div class="nav-list">
                    <a href="../index.html" class="nav-link">工具首页</a>
                </div>
            </nav>
        </div>
    </div>
</header>
<!-- END_COMMON_HEADER -->
    <div class="container">
        <header aria-label="透明边缘裁剪工具标题">
            <h1>图像透明区域裁剪工具</h1>
            <p class="subtitle">上传带有透明背景的PNG图像，自动裁剪掉多余的透明区域，优化图像尺寸并保留透明通道</p>
        </header>

        <div class="content">
            <div class="upload-area">
                <button class="drop-zone" id="dropZone" type="button" aria-describedby="uploadHelp">
                    <i aria-hidden="true"></i>
                    <span id="uploadHelp">拖放 PNG 图像到此处<br>或点击选择文件</span>
                </button>
                <input type="file" id="fileInput" accept="image/png" class="hidden">
                <button id="processBtn" class="button" type="button" disabled>
                    <span>重新处理</span>
                </button>

                <div id="statusArea" class="status info hidden">
                    请上传PNG格式的图像文件，上传后将自动处理
                </div>
            </div>

            <div class="preview-area">
                <div class="preview-title">
                    <h2>预览结果</h2>
                    <button id="downloadBtn" class="button" type="button" disabled>
                        <span>下载裁剪图像</span>
                    </button>
                </div>

                <div class="image-container">
                    <div class="image-box original">
                        <img id="originalPreview" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="原始图像预览">
                        <div class="image-label">原始图像</div>
                    </div>

                    <div class="image-box">
                        <img id="croppedPreview" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" alt="裁剪后图像预览">
                        <div class="image-label">裁剪后图像</div>
                    </div>
                </div>

                <div id="resultInfo" class="status hidden">
                    <!-- 裁剪结果信息将显示在这里 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const EMPTY_IMAGE_SRC = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==';
            const MAX_FILE_BYTES = 50 * 1024 * 1024;
            const MAX_PIXELS = 24_000_000;
            const MAX_DIMENSION = 16_384;

            const fileInput = document.getElementById('fileInput');
            const dropZone = document.getElementById('dropZone');
            const processBtn = document.getElementById('processBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const originalPreview = document.getElementById('originalPreview');
            const croppedPreview = document.getElementById('croppedPreview');
            const statusArea = document.getElementById('statusArea');
            const resultInfo = document.getElementById('resultInfo');
            
            let originalImage = null;
            let sourceObjectUrl = '';
            let croppedObjectUrl = '';
            let croppedBlob = null;
            let originalFileName = 'image.png';
            let originalFileSize = 0;
            let loadToken = 0;
            
            // 点击拖放区域触发文件选择
            dropZone.addEventListener('click', () => {
                fileInput.click();
            });

            // 拖放功能处理
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, preventDefaults, false);
            });
            
            function preventDefaults(e) {
                e.preventDefault();
                e.stopPropagation();
            }
            
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZone.addEventListener(eventName, highlight, false);
            });
            
            ['dragleave', 'drop'].forEach(eventName => {
                dropZone.addEventListener(eventName, unhighlight, false);
            });
            
            function highlight() {
                dropZone.classList.add('dragover');
            }
            
            function unhighlight() {
                dropZone.classList.remove('dragover');
            }
            
            // 处理文件拖放
            dropZone.addEventListener('drop', handleDrop, false);
            
            function handleDrop(e) {
                const dt = e.dataTransfer;
                const files = dt.files;
                handleFiles(files);
            }
            
            // 处理文件选择
            fileInput.addEventListener('change', () => {
                handleFiles(fileInput.files);
                fileInput.value = '';
            });
            
            function handleFiles(files) {
                if (files.length === 0) return;
                
                const file = files[0];
                const validationMessage = validateFile(file);
                if (validationMessage) {
                    showStatus(validationMessage, 'error');
                    return;
                }

                const token = ++loadToken;
                releaseSource();
                releaseCropped();
                originalFileName = file.name || 'image.png';
                originalFileSize = file.size;
                sourceObjectUrl = URL.createObjectURL(file);
                originalImage = new Image();
                originalImage.decoding = 'async';
                originalImage.onload = () => {
                    if (token !== loadToken) return;
                    const dimensionMessage = validateDimensions(originalImage.naturalWidth, originalImage.naturalHeight);
                    if (dimensionMessage) {
                        releaseSource();
                        showStatus(dimensionMessage, 'error');
                        return;
                    }

                    originalPreview.src = sourceObjectUrl;
                    processBtn.disabled = false;
                    showStatus('图像已加载，正在自动裁剪透明边缘...', 'info');
                    resultInfo.classList.add('hidden');
                    downloadBtn.disabled = true;
                    croppedPreview.src = EMPTY_IMAGE_SRC;

                    void processImage();
                };
                originalImage.onerror = () => {
                    if (token !== loadToken) return;
                    releaseSource();
                    showStatus('图片解码失败，文件可能已损坏。', 'error');
                };
                originalImage.src = sourceObjectUrl;
            }

            function validateFile(file) {
                if (!file || file.size === 0) {
                    return '请选择非空 PNG 图像文件';
                }
                const isPng = file.type === 'image/png' || (!file.type && /\.png$/i.test(file.name || ''));
                if (!isPng) {
                    return '请选择 PNG 格式的图像文件，其他格式可能不包含可保留的透明通道';
                }
                if (file.size > MAX_FILE_BYTES) {
                    return '文件超过 50 MB，请先压缩或缩小图片';
                }
                return '';
            }

            function validateDimensions(width, height) {
                if (!width || !height) {
                    return '图片没有有效尺寸';
                }
                if (width > MAX_DIMENSION || height > MAX_DIMENSION || width * height > MAX_PIXELS) {
                    return '图片尺寸过大，请使用最长边不超过 16384 px、总像素不超过 2400 万的 PNG';
                }
                return '';
            }

            function releaseSource() {
                if (sourceObjectUrl) {
                    URL.revokeObjectURL(sourceObjectUrl);
                    sourceObjectUrl = '';
                }
                originalImage = null;
                originalPreview.src = EMPTY_IMAGE_SRC;
                processBtn.disabled = true;
            }

            function releaseCropped() {
                if (croppedObjectUrl) {
                    URL.revokeObjectURL(croppedObjectUrl);
                    croppedObjectUrl = '';
                }
                croppedBlob = null;
                croppedPreview.src = EMPTY_IMAGE_SRC;
                downloadBtn.disabled = true;
            }
            // 图像处理函数
            async function processImage() {
                if (!originalImage) return;
                releaseCropped();
                showStatus('正在扫描非透明像素边界...', 'info');
                
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                if (!ctx) {
                    showStatus('当前浏览器无法创建 Canvas，不能处理图片', 'error');
                    return;
                }
                
                // 设置canvas尺寸与图像相同
                canvas.width = originalImage.naturalWidth || originalImage.width;
                canvas.height = originalImage.naturalHeight || originalImage.height;
                
                // 绘制图像到canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(originalImage, 0, 0);
                
                // 获取图像数据
                let imageData;
                try {
                    imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                } catch (error) {
                    showStatus('无法读取图片像素，请确认文件未损坏。', 'error');
                    return;
                }
                const data = imageData.data;
                
                // 寻找非透明区域的边界
                let minX = canvas.width;
                let minY = canvas.height;
                let maxX = 0;
                let maxY = 0;
                
                // 遍历所有像素，找到非透明像素的边界
                for (let y = 0; y < canvas.height; y++) {
                    for (let x = 0; x < canvas.width; x++) {
                        const idx = (y * canvas.width + x) * 4;
                        const alpha = data[idx + 3];
                        
                        // 如果像素不是完全透明的
                        if (alpha > 0) {
                            if (x < minX) minX = x;
                            if (y < minY) minY = y;
                            if (x > maxX) maxX = x;
                            if (y > maxY) maxY = y;
                        }
                    }
                }
                
                // 计算裁剪区域
                const width = maxX - minX + 1;
                const height = maxY - minY + 1;
                
                // 检查图像是否完全透明
                if (width <= 0 || height <= 0) {
                    showStatus('图像完全透明，没有可保留的非透明内容。', 'error');
                    return;
                }
                
                // 创建裁剪后的canvas
                const croppedCanvas = document.createElement('canvas');
                croppedCanvas.width = width;
                croppedCanvas.height = height;
                
                const croppedCtx = croppedCanvas.getContext('2d');
                if (!croppedCtx) {
                    showStatus('当前浏览器无法创建导出 Canvas。', 'error');
                    return;
                }
                
                // 设置背景为透明
                croppedCtx.clearRect(0, 0, width, height);
                
                // 将原始图像中非透明区域绘制到新canvas
                croppedCtx.drawImage(
                    originalImage,
                    minX, minY, width, height,
                    0, 0, width, height
                );
                
                let blob;
                try {
                    blob = await canvasToBlob(croppedCanvas);
                } catch (error) {
                    showStatus('PNG 导出失败，请缩小图片后重试。', 'error');
                    return;
                }

                croppedBlob = blob;
                croppedObjectUrl = URL.createObjectURL(blob);
                croppedPreview.src = croppedObjectUrl;
                downloadBtn.disabled = false;
                
                // 显示裁剪信息
                const sizeReduction = Math.max(0, Math.round(
                    (1 - (width * height) / (canvas.width * canvas.height)) * 100
                ));

                resultInfo.replaceChildren(
                    createInfoLine(`原始尺寸: ${canvas.width}×${canvas.height} (${formatBytes(originalFileSize)})`),
                    createInfoLine(`裁剪尺寸: ${width}×${height} (${formatBytes(blob.size)})`),
                    createInfoLine(`像素面积减少: ${sizeReduction}%`)
                );
                resultInfo.classList.remove('hidden');
                resultInfo.className = 'status success';
                
                showStatus(`透明边缘裁剪完成，像素面积减少 ${sizeReduction}%。`, 'success');
            }
            
            // 保留按钮点击事件作为备用
            processBtn.addEventListener('click', () => {
                void processImage();
            });
            
            // 下载裁剪后的图像
            downloadBtn.addEventListener('click', () => {
                if (!croppedObjectUrl || !croppedBlob) return;
                
                const link = document.createElement('a');
                link.href = croppedObjectUrl;
                link.download = `${getSafeBaseName(originalFileName)}-trimmed.png`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });

            window.addEventListener('beforeunload', () => {
                releaseSource();
                releaseCropped();
            });

            function canvasToBlob(canvas) {
                return new Promise((resolve, reject) => {
                    canvas.toBlob((blob) => {
                        if (blob) resolve(blob);
                        else reject(new Error('PNG 编码失败'));
                    }, 'image/png');
                });
            }

            function createInfoLine(text) {
                const paragraph = document.createElement('p');
                paragraph.textContent = text;
                return paragraph;
            }

            function getSafeBaseName(name) {
                return String(name || 'image')
                    .replace(/\.[^.]+$/, '')
                    .replace(/[<>:"/\\|?*\u0000-\u001f]/g, '-')
                    .trim()
                    .slice(0, 80) || 'image';
            }
            
            // 辅助函数：显示状态信息
            function showStatus(message, type = 'info') {
                statusArea.textContent = message;
                statusArea.className = `status ${type}`;
                statusArea.classList.remove('hidden');
            }
            
            // 辅助函数：格式化字节大小
            function formatBytes(bytes, decimals = 2) {
                if (bytes === 0) return '0 Bytes';
                
                const k = 1024;
                const dm = decimals < 0 ? 0 : decimals;
                const sizes = ['Bytes', 'KB', 'MB', 'GB'];
                
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                
                return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
            }
        });
    </script>
