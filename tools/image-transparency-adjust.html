<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="icon" type="image/png" href="/icon/aipictools.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片透明度调整工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 30px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            color: #3498db;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.05);
        }

        .card-title {
            font-size: 1.25rem;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            color: #2c3e50;
        }

        .card-title svg {
            margin-right: 10px;
            color: #3498db;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 500;
            margin-bottom: 8px;
            color: #34495e;
            display: flex;
            align-items: center;
        }

        label svg {
            margin-right: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(52, 152, 219, 0.3);
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 6px rgba(52, 152, 219, 0.3);
        }

        .value-display {
            min-width: 60px;
            text-align: center;
            font-weight: 600;
            color: #3498db;
            background: rgba(52, 152, 219, 0.1);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 1rem;
        }

        .file-upload {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .upload-area {
            width: 100%;
            border: 2px dashed #3498db;
            border-radius: 12px;
            padding: 35px 20px;
            text-align: center;
            background: rgba(52, 152, 219, 0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            color: inherit;
            font: inherit;
        }

        .upload-area:hover {
            background: rgba(52, 152, 219, 0.1);
        }

        .upload-area.dragover {
            background: rgba(52, 152, 219, 0.15);
        }

        input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 3.5rem;
            color: #3498db;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #3498db;
            font-weight: 500;
            margin-bottom: 5px;
            font-size: 1.2rem;
        }

        .upload-hint {
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            margin-top: 25px;
        }

        .preview-box {
            flex: 1;
            min-width: 300px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            background: white;
        }

        .preview-title {
            padding: 15px;
            background: #f8f9fa;
            font-weight: 500;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }

        .preview-title svg {
            margin-right: 8px;
        }

        .preview-content {
            padding: 20px;
            text-align: center;
            background: #f8f9fa;
            min-height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            max-width: 100%;
            max-height: 400px;
            background:
                linear-gradient(45deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(-45deg, #f0f0f0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #f0f0f0 75%),
                linear-gradient(-45deg, transparent 75%, #f0f0f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 150px;
            height: 50px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        button svg {
            margin-right: 10px;
        }

        button:focus-visible,
        input:focus-visible,
        .upload-area:focus-visible {
            outline: 3px solid rgba(52, 152, 219, 0.32);
            outline-offset: 2px;
        }


        .download-btn {
            background: #2ecc71;
            color: white;
        }

        .download-btn:hover {
            background: #27ae60;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(46, 204, 113, 0.3);
        }

        .reset-btn {
            background: #e74c3c;
            color: white;
        }

        .reset-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.3);
        }

        .footer {
            margin-top: 20px;
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9rem;
        }

        .status-message {
            color: #3498db;
            min-height: 1.5em;
            font-size: 0.92rem;
        }

        @media (max-width: 768px) {
            .preview-container {
                flex-direction: column;
            }

            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>

  <link rel="stylesheet" href="styles/common.css">
  <link rel="stylesheet" href="themes/default.css">
  <script src="scripts/common.js" defer></script>

<body class="tool-page" data-tool-page="image-transparency-adjust">

<header class="page-header" aria-label="站点页头">

                <a href="../index.html" class="logo-link" aria-label="我的工具站首页">

                    <span>我的工具站</span>

            </div>
            <nav class="nav-desktop" aria-label="主要导航">
                <div class="nav-list">

                </div>

    <div class="container">
        <header aria-label="图片透明度调整工具标题">
            <h1>图片透明度调整工具</h1>
            <p class="subtitle">上传图片并调整非透明区域的透明度，支持实时预览和下载。默认透明度为50%，可根据需要调整。</p>
        </header>

        <main>
            <div class="card">
                <h2 class="card-title">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    控制面板
                </h2>

                <div class="controls">
                    <div class="control-group">
                        <label>
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M12 8l4 4"></path>
                                <path d="M12 16l-4-4"></path>
                            </svg>
                            透明度调整
                        </label>
                        <div class="slider-container">
                            <input type="range" id="transparency-slider" min="0" max="100" value="50">
                            <div class="value-display" id="transparency-value">50%</div>
                        </div>
                    </div>
                </div>

                <div class="file-upload">
                    <label>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                        上传图片
                    </label>
                    <button class="upload-area" id="upload-area" type="button">
                        <span class="upload-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#3498db" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                        </span>
                        <span class="upload-text">点击或拖拽图片到此处</span>
                        <span class="upload-hint">支持 JPG、PNG、WebP、GIF 等浏览器可解码图片（最大 50MB）</span>
                    </button>
                    <input type="file" id="file-input" accept="image/*">
                    <div class="status-message" id="status-message" aria-live="polite"></div>
                </div>
            </div>

            <div class="actions">
                <button id="download-btn" class="download-btn" type="button" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    下载结果
                </button>
                <button id="reset-btn" class="reset-btn" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2.5 2v6h6M21.5 22v-6h-6"></path>
                        <path d="M22 11.5A10 10 0 0 0 3.2 7.2M2 12.5a10 10 0 0 0 18.8 4.2"></path>
                    </svg>
                    重置
                </button>
            </div>

            <div class="preview-container">
                <div class="preview-box">
                    <div class="preview-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        原始图片
                    </div>
                    <div class="preview-content">
                        <canvas id="original-canvas"></canvas>
                    </div>
                </div>

                <div class="preview-box">
                    <div class="preview-title">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        调整结果
                    </div>
                    <div class="preview-content">
                        <canvas id="result-canvas"></canvas>
                    </div>
                </div>
            </div>
        </main>

        <div class="footer">
            <p>基于 Canvas API 实现 | 图片处理在浏览器中完成，不会上传到服务器</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 获取DOM元素
            const fileInput = document.getElementById('file-input');
            const uploadArea = document.getElementById('upload-area');
            const originalCanvas = document.getElementById('original-canvas');
            const resultCanvas = document.getElementById('result-canvas');
            const downloadBtn = document.getElementById('download-btn');
            const resetBtn = document.getElementById('reset-btn');
            const transparencySlider = document.getElementById('transparency-slider');
            const transparencyValue = document.getElementById('transparency-value');
            const statusMessage = document.getElementById('status-message');

            const MAX_FILE_BYTES = 50 * 1024 * 1024;
            const MAX_IMAGE_PIXELS = 24_000_000;
            const MAX_CANVAS_SIDE = 16_384;

            let originalImage = null;
            let processedImageData = null;
            let originalFileName = 'transparency-adjusted-image';
            let sourceObjectUrl = '';
            let loadToken = 0;

            // 透明度滑块事件
            transparencySlider.addEventListener('input', (e) => {
                const value = e.target.value;
                transparencyValue.textContent = value + '%';

                // 如果有图片，自动处理
                if (originalImage) {
                    processImage();
                }
            });

            // 上传区域点击事件
            uploadArea.addEventListener('click', () => {
                fileInput.click();
            });

            // 拖拽事件
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });

            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });

            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');

                if (e.dataTransfer.files.length) {
                    handleFile(e.dataTransfer.files[0]);
                }
            });

            // 文件选择事件
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length) {
                    handleFile(e.target.files[0]);
                }
            });


            // 下载按钮事件
            downloadBtn.addEventListener('click', () => {
                if (!processedImageData) return;
                if (!resultCanvas.toBlob) {
                    setStatus('当前浏览器不支持导出画布图片，请更新浏览器后重试。');
                    return;
                }

                const link = document.createElement('a');
                link.download = `${sanitizeFileBase(originalFileName)}-opacity.png`;
                downloadBtn.disabled = true;
                resultCanvas.toBlob((blob) => {
                    downloadBtn.disabled = false;
                    if (!blob) {
                        setStatus('导出失败，请降低图片尺寸后重试。');
                        return;
                    }
                    const url = URL.createObjectURL(blob);
                    link.href = url;
                    link.click();
                    setTimeout(() => URL.revokeObjectURL(url), 0);
                }, 'image/png');
            });

            // 重置按钮事件
            resetBtn.addEventListener('click', () => {
                fileInput.value = '';
                originalCanvas.getContext('2d').clearRect(0, 0, originalCanvas.width, originalCanvas.height);
                resultCanvas.getContext('2d').clearRect(0, 0, resultCanvas.width, resultCanvas.height);
                transparencySlider.value = '50';
                transparencyValue.textContent = '50%';
                downloadBtn.disabled = true;
                originalImage = null;
                processedImageData = null;
                originalFileName = 'transparency-adjusted-image';
                releaseSourceObjectUrl();
                setStatus('已重置。');
            });

            // 处理上传的文件
            function handleFile(file) {
                if (!file.type.match('image.*')) {
                    setStatus('请上传图片文件。');
                    return;
                }

                if (file.size > MAX_FILE_BYTES) {
                    setStatus('图片大小不能超过 50MB。');
                    return;
                }

                const objectUrl = URL.createObjectURL(file);
                const token = ++loadToken;
                const image = new Image();
                image.onload = () => {
                    if (token !== loadToken) {
                        URL.revokeObjectURL(objectUrl);
                        return;
                    }

                    const width = image.naturalWidth || image.width;
                    const height = image.naturalHeight || image.height;
                    if (!canUseImageSize(width, height)) {
                        URL.revokeObjectURL(objectUrl);
                        setStatus('图片尺寸过大，请选择不超过 2400 万像素且单边不超过 16384px 的图片。');
                        return;
                    }

                    releaseSourceObjectUrl();
                    sourceObjectUrl = objectUrl;
                    originalImage = image;
                    originalFileName = file.name.replace(/\.[^.]+$/, '') || 'transparency-adjusted-image';
                    drawOriginalImage(width, height);
                    processImage();
                    fileInput.value = '';
                    setStatus(`已载入 ${width} × ${height}px 图片，下载会保留原始尺寸。`);
                };
                image.onerror = () => {
                    URL.revokeObjectURL(objectUrl);
                    if (token === loadToken) setStatus('图片无法加载，可能是文件损坏或格式不受浏览器支持。');
                };
                image.src = objectUrl;
            }

            // 绘制原始图片
            function drawOriginalImage(width, height) {
                const ctx = originalCanvas.getContext('2d');
                originalCanvas.width = width;
                originalCanvas.height = height;
                ctx.clearRect(0, 0, width, height);
                ctx.drawImage(originalImage, 0, 0, width, height);

                // 重置结果Canvas
                const resultCtx = resultCanvas.getContext('2d');
                resultCanvas.width = width;
                resultCanvas.height = height;
                resultCtx.clearRect(0, 0, width, height);

                downloadBtn.disabled = true;
            }

            // 处理图片
            function processImage() {
                if (!originalImage) {
                    setStatus('请先上传图片。');
                    return;
                }

                const parsedTransparency = Number.parseInt(transparencySlider.value, 10);
                const transparency = Number.isNaN(parsedTransparency) ? 50 : parsedTransparency;

                if (transparency < 0 || transparency > 100) {
                    setStatus('透明度必须在 0-100 之间。');
                    return;
                }

                const ctx = resultCanvas.getContext('2d');
                resultCanvas.width = originalCanvas.width;
                resultCanvas.height = originalCanvas.height;

                // 绘制原始图像到结果Canvas
                ctx.drawImage(originalImage, 0, 0, resultCanvas.width, resultCanvas.height);

                // 获取图像数据
                const imageData = ctx.getImageData(0, 0, resultCanvas.width, resultCanvas.height);
                const data = imageData.data;
                const ratio = transparency / 100;

                // 处理每个像素的透明度
                for (let i = 0; i < data.length; i += 4) {
                    const alpha = data[i + 3]; // 获取当前alpha值

                    // 如果像素不是完全透明的，则调整其透明度
                    if (alpha > 0) {
                        data[i + 3] = Math.round(alpha * ratio);
                    }
                }

                // 将处理后的图像数据放回Canvas
                ctx.putImageData(imageData, 0, 0);
                processedImageData = imageData;
                downloadBtn.disabled = false;
            }

            window.addEventListener('pagehide', releaseSourceObjectUrl);

            function canUseImageSize(width, height) {
                return width > 0 && height > 0 && width <= MAX_CANVAS_SIDE && height <= MAX_CANVAS_SIDE && width * height <= MAX_IMAGE_PIXELS;
            }

            function setStatus(message) {
                statusMessage.textContent = message;
            }

            function releaseSourceObjectUrl() {
                if (sourceObjectUrl) {
                    URL.revokeObjectURL(sourceObjectUrl);
                    sourceObjectUrl = '';
                }
            }

            function sanitizeFileBase(name) {
                return String(name || 'transparency-adjusted-image').replace(/[\\/:*?"<>|]+/g, '-');
            }
        });
    </script>

        </div>
        <nav class="footer-links" aria-label="页脚导航">
